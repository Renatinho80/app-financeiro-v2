<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Arco superior -->
  <path d="M 40,100 A 60,60 0 0 1 160,100" fill="none" stroke="#1D9E75" stroke-width="5" stroke-linecap="round"/>
  <!-- Ponta superior direita -->
  <polyline points="148,76 160,100 136,104" fill="none" stroke="#1D9E75" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arco inferior -->
  <path d="M 160,120 A 60,60 0 0 1 40,120" fill="none" stroke="#0F6E56" stroke-width="5" stroke-linecap="round"/>
  <!-- Ponta inferior esquerda -->
  <polyline points="52,144 40,120 64,116" fill="none" stroke="#0F6E56" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- R$ central -->
  <text x="100" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1D9E75">R$</text>
</svg>
