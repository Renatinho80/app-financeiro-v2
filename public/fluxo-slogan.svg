<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300&display=swap');
    </style>
  </defs>
  <!-- Linha decorativa esquerda -->
  <line x1="20" y1="40" x2="100" y2="40" stroke="#D3D1C7" stroke-width="1"/>
  <!-- Ponto verde central -->
  <circle cx="260" cy="40" r="4" fill="#1D9E75"/>
  <!-- Linha decorativa direita -->
  <line x1="420" y1="40" x2="500" y2="40" stroke="#D3D1C7" stroke-width="1"/>

  <!-- Slogan -->
  <text
    x="260"
    y="28"
    text-anchor="middle"
    font-family="'Outfit', Arial, sans-serif"
    font-weight="300"
    font-size="14"
    letter-spacing="3"
    fill="#888780"
  >CADA REAL NO LUGAR CERTO.</text>
</svg>
